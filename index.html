<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAUSTECH | Admission Eligibility Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .oaustech-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-lg mb-6 flex items-center justify-between px-2">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">OA</div>
            <div>
                <h2 class="text-white font-bold text-sm leading-tight uppercase tracking-wider">OAUSTECH</h2>
                <p class="text-blue-400 text-[10px] font-medium tracking-widest uppercase">Admissions Support</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-tighter">System ID: ZT-2026</p>
        </div>
    </div>

    <div class="glass-panel w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl">
        <div class="oaustech-gradient p-8 text-center">
            <h1 class="text-2xl font-bold text-white mb-2">Eligibility Screener</h1>
            <p class="text-blue-100 text-xs opacity-80 uppercase tracking-widest font-medium">Official Admission Logic Engine</p>
        </div>

        <div class="p-8 space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Aspirant UTME Score</label>
                <input type="number" id="jambScore" placeholder="Enter Score" 
                       class="w-full bg-slate-900 border border-slate-700 text-white text-xl font-bold p-5 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all placeholder:text-slate-700">
            </div>

            <button onclick="runAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-3">
                <span>VERIFY ELIGIBILITY</span>
                <i class="fa-solid fa-shield-check"></i>
            </button>

            <div id="statusBox" class="hidden animate-pulse">
                <div class="p-5 rounded-2xl bg-slate-900 border-l-4 border-blue-500">
                    <p id="responseText" class="text-slate-300 text-sm leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-8 text-center space-y-4">
        <p class="text-slate-600 text-[10px] font-bold uppercase tracking-[0.2em]">
            Developed for OAUSTECH by <span class="text-blue-500">Zetra Lab Systems</span>
        </p>
        
        <a href="https://wa.me/2348065425732" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-slate-400 text-xs hover:text-white hover:bg-slate-700 transition">
            <i class="fa-brands fa-whatsapp text-green-500"></i>
            <span>Contact Tech Support</span>
        </a>
    </div>

    <script>
        function runAnalysis() {
            const score = parseInt(document.getElementById('jambScore').value);
            const box = document.getElementById('statusBox');
            const text = document.getElementById('responseText');

            if (!score || score < 0 || score > 400) {
                alert("Please enter a valid academic score.");
                return;
            }

            box.classList.remove('hidden');
            box.classList.remove('animate-pulse');

            if (score >= 200) {
                text.innerHTML = "<span class='text-blue-400 font-bold'>OFFICIAL STATUS:</span> This score meets the primary threshold for competitive departments (Nursing/MLS). Recommendation: Proceed to data verification.";
            } else if (score >= 180) {
                text.innerHTML = "<span class='text-blue-400 font-bold'>OFFICIAL STATUS:</span> Candidate is eligible for Computer Science, Public Health, and School of Sciences programs.";
            } else {
                text.innerHTML = "<span class='text-yellow-500 font-bold'>OFFICIAL STATUS:</span> Standard eligibility met. Candidate is encouraged to explore options in Agriculture and Earth Sciences for guaranteed placement.";
            }
        }
    </script>
</body>
  </html>
