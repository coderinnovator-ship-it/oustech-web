<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAUSTECH Admission Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#0A1C3C;color:white;font-family:sans-serif;}
.card{background:rgba(255,255,255,0.05);border-radius:20px;padding:18px;}
.input{width:100%;padding:14px;border-radius:12px;background:black;border:1px solid #1e293b;text-align:center;}
.input:focus{border-color:gold;outline:none;}
.btn{width:100%;padding:14px;border-radius:12px;font-weight:bold;}
#resultBox{display:none;}
.ticker{overflow:hidden;white-space:nowrap;background:black;border-bottom:2px solid gold;}
.ticker span{display:inline-block;padding-left:100%;animation:scroll 25s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>

<body class="flex flex-col items-center">

<!-- SLOGAN -->
<div class="ticker w-full">
<span class="text-yellow-400 text-xs font-bold">
OAUSTECH • FOR SOCIETY AND DEVELOPMENT • EXCELLENCE IN SCIENCE & TECHNOLOGY •
</span>
</div>

<!-- HEADER -->
<div class="mt-6 text-center">
<img src="./logo.png" class="w-20 mx-auto mb-2 rounded-full border-4 border-yellow-500 bg-white p-1">
<h1 class="text-xl font-bold">ADMISSION <span class="text-yellow-400">INTELLIGENCE</span></h1>
<p id="counter" class="text-yellow-400 text-xs mt-1">1,284 students checked</p>
<p class="text-[11px] text-gray-400 px-6 mt-2">
Independent tool. Final admission decisions are made by University Management.
</p>
</div>

<!-- MAIN -->
<div class="card w-[92%] max-w-xs mt-5">

<input id="name" placeholder="Your Name" class="input">

<select id="course" class="input mt-3">

<!-- HEALTH -->
<option value="225">Nursing Science</option>
<option value="215">Medical Laboratory Science</option>
<option value="200">Public Health</option>

<!-- SCIENCE -->
<option value="200">Computer Science</option>
<option value="195">Biochemistry</option>
<option value="190">Microbiology</option>
<option value="185">Industrial Chemistry</option>
<option value="180">Mathematics</option>
<option value="175">Statistics</option>

<!-- ENGINEERING -->
<option value="200">Mechanical Engineering</option>
<option value="195">Electrical Engineering</option>
<option value="190">Civil Engineering</option>

<!-- MANAGEMENT -->
<option value="200">Accounting</option>
<option value="195">Business Administration</option>
<option value="190">Economics</option>

</select>

<input id="score" type="number" placeholder="Enter UTME Score" class="input mt-3 text-xl">

<button onclick="runSim()" class="btn bg-red-700 mt-4">Run Simulation</button>

<div id="resultBox" class="mt-4 p-4 bg-black/40 rounded-xl">
<h2 id="status" class="text-lg font-bold"></h2>
<p id="message" class="text-sm mt-2"></p>

<button onclick="downloadPDF()" class="btn bg-yellow-600 mt-3">Download Report</button>
</div>

</div>

<!-- CONTACT -->
<div class="mt-6 grid grid-cols-2 gap-3 w-[92%] max-w-xs">

<a href="https://wa.me/2348056604409" class="bg-black p-4 rounded-xl text-center border border-gray-700">
<p class="text-green-400 font-bold text-sm">Technical Support</p>
<p class="text-[11px] text-gray-400">Feedback & Help</p>
</a>

<a href="mailto:info@oaustech.edu.ng" class="bg-black p-4 rounded-xl text-center border border-gray-700">
<p class="text-blue-400 font-bold text-sm">OAUSTECH Contact</p>
<p class="text-[11px] text-gray-400">Official Email</p>
</a>

</div>

<script>

/* COUNTER */
let count=1284;
setInterval(()=>{
count+=Math.floor(Math.random()*3)+1;
document.getElementById("counter").innerText=count.toLocaleString()+" students checked";
},3000);

/* RUN */
function runSim(){
let score=parseInt(document.getElementById("score").value);
if(isNaN(score)||score<0||score>400){
showResult("Invalid Score","Enter valid score (0–400)","red");
return;
}
simulateLoading();
}

/* LOADING */
function simulateLoading(){
let steps=["Accessing Registry...","Analyzing Data...","Finalizing..."];
let i=0;
function next(){
if(i<steps.length){
showResult("Processing",steps[i],"yellow");
i++;setTimeout(next,700);
}else{processResult();}
}
next();
}

/* INTELLIGENCE ENGINE */
function processResult(){

const score=parseInt(document.getElementById("score").value);
const name=document.getElementById("name").value||"Candidate";

const select=document.getElementById("course");
const cutoff=parseInt(select.value);
const courseName=select.options[select.selectedIndex].text;

let diff=score-cutoff;
let chance=Math.max(5,Math.min(95,50+diff*2));

let level="",color="",msg="";

if(diff>=25){
level="🔥 STRONG ADVANTAGE";
color="green";
msg="Score is far above competitive range.";
}
else if(diff>=5){
level="⚖️ COMPETITIVE";
color="green";
msg="Within competitive range.";
}
else if(diff>=-10){
level="⚠️ BORDERLINE";
color="yellow";
msg="Highly competitive.";
}
else{
level="❌ VERY LOW CHANCE";
color="red";
msg="Below expected range.";
}

let alt=getAlt(score);

showResult(
level,
`${name}, ${msg}
Chance: ${chance}%
Course: ${courseName}
Alternative: ${alt}`,
color
);

window.data={name,score,courseName,level,chance,alt};
}

/* ALTERNATIVES */
function getAlt(score){
if(score>=210)return "Biochemistry, Computer Science";
if(score>=190)return "Microbiology, Public Health";
if(score>=170)return "Industrial Chemistry, Mathematics";
return "Statistics, Basic Sciences";
}

/* DISPLAY */
function showResult(title,text,color){
let box=document.getElementById("resultBox");
box.style.display="block";
document.getElementById("status").innerText=title;
document.getElementById("status").className="text-"+color+"-400 font-bold";
document.getElementById("message").innerText=text;
}

/* PDF */
function downloadPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let d=window.data;

let img=new Image();
img.src="./logo.png";

img.onload=function(){
doc.addImage(img,'PNG',80,5,40,20);
doc.text("Admission Intelligence Report",20,40);
doc.text(`Name: ${d.name}`,20,60);
doc.text(`Score: ${d.score}`,20,70);
doc.text(`Course: ${d.courseName}`,20,80);
doc.text(`Level: ${d.level}`,20,90);
doc.text(`Chance: ${d.chance}%`,20,100);
doc.text(`Alternative: ${d.alt}`,20,110);

doc.text("Final decisions are made by University Management.",20,140);
doc.text("Powered by Zetra Lab",20,160);

doc.save("report.pdf");
};
}

</script>

</body>
  </html>
