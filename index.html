<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAUSTECH Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --oaustech-blue: #0A1C3C; --oaustech-red: #9B1C2A; --oaustech-gold: #F2B705; }
        body { background: var(--oaustech-blue); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; }
        .card-glass { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1); border-top: 4px solid var(--oaustech-red); }
        .btn-official { background: var(--oaustech-red); border-bottom: 3px solid #7D1621; }
        .ticker { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; background: #000; padding: 10px 0; border-bottom: 1px solid var(--oaustech-gold); }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .seal-main { width: 80px; height: 80px; background: white; border-radius: 50%; border: 3px solid var(--oaustech-gold); display: flex; align-items: center; justify-content: center; position: relative; }
        .seal-orbit { position: absolute; width: 100px; height: 100px; border: 1px dashed var(--oaustech-gold); border-radius: 50%; animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="w-full overflow-hidden ticker text-[10px] font-bold text-yellow-400 uppercase tracking-widest">
        <span>Building the Blue Economy • Excellence in Science & Technology • Official Registry Audit •</span>
    </div>

    <header class="flex flex-col items-center mt-8 mb-6">
        <div class="seal-main">
            <div class="seal-orbit"></div>
            <span class="text-blue-900 font-black text-sm">OAUS</span>
        </div>
        <h1 class="text-2xl font-black mt-4 tracking-tight">ADMISSION <span class="text-yellow-500">AUDIT</span></h1>
    </header>

    <main class="w-full max-w-md px-4">
        <div class="card-glass rounded-3xl p-6 shadow-xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Faculty</label>
                    <select id="faculty" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white text-sm outline-none">
                        <option value="220">Nursing / MLS / Public Health</option>
                        <option value="200">Computing (CS / IT)</option>
                        <option value="190">Engineering</option>
                        <option value="180">Pure & Applied Sciences</option>
                        <option value="170">Management Sciences</option>
                        <option value="160">Agriculture</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Your UTME Score</label>
                    <input type="number" id="score" placeholder="Enter Score" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-3xl font-black text-white text-center outline-none">
                </div>

                <button onclick="runAudit()" class="w-full btn-official py-4 rounded-xl font-black text-xs tracking-widest uppercase">
                    Check Eligibility
                </button>
            </div>

            <div id="result" class="hidden mt-8 p-6 rounded-2xl bg-black/40 border-l-4 border-yellow-500">
                <div id="status" class="text-lg font-black uppercase mb-2"></div>
                <p id="msg" class="text-slate-300 text-sm font-medium leading-tight mb-6"></p>
                <button onclick="downloadReport()" class="w-full bg-yellow-600 p-3 rounded-lg text-[10px] font-black uppercase tracking-widest">
                    Get PDF Report
                </button>
            </div>
        </div>
    </main>

    <div class="w-full max-w-md grid grid-cols-2 gap-3 px-4 mt-6 mb-10">
        <a href="https://wa.me/2348056604409" class="flex flex-col items-center p-4 rounded-2xl bg-slate-900 border border-slate-800">
            <i class="fa-brands fa-whatsapp text-green-500 mb-1 text-xl"></i>
            <span class="text-[9px] font-bold uppercase">Zetra Tech</span>
        </a>
        <a href="tel:+2348060840326" class="flex flex-col items-center p-4 rounded-2xl bg-slate-900 border border-slate-800">
            <i class="fa-solid fa-phone text-blue-500 mb-1 text-xl"></i>
            <span class="text-[9px] font-bold uppercase">Call Registry</span>
        </a>
    </div>

    <footer class="opacity-30 text-[8px] font-bold tracking-widest mb-10">
        POWERED BY ZETRA COGNITIVE SYSTEMS
    </footer>

    <script>
        function runAudit() {
            const score = parseInt(document.getElementById('score').value);
            const cutoff = parseInt(document.getElementById('faculty').value);
            const facultyName = document.getElementById('faculty').options[document.getElementById('faculty').selectedIndex].text;
            
            if(!score) return;
            
            const resultBox = document.getElementById('result');
            const statusDiv = document.getElementById('status');
            const msgP = document.getElementById('msg');
            
            resultBox.classList.remove('hidden');
            
            if (score >= cutoff) {
                statusDiv.className = "text-green-500 text-lg font-black uppercase mb-2";
                statusDiv.innerText = "PASS: ADMISSION LIKELY";
                msgP.innerText = `Your score of ${score} is high enough for ${facultyName}. You have a very good chance of being admitted. Congratulations!`;
            } else {
                statusDiv.className = "text-yellow-500 text-lg font-black uppercase mb-2";
                statusDiv.innerText = "LOW: ADMISSION UNLIKELY";
                msgP.innerText = `Your score of ${score} is below the target for ${facultyName}. Admission might be difficult this year. Contact support for advice.`;
            }
            
            window.lastAudit = { score, facultyName, status: statusDiv.innerText, msg: msgP.innerText };
        }

        function downloadReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = window.lastAudit;
            
            doc.setFillColor(10, 28, 60); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(16); doc.text("OAUSTECH ADMISSION AUDIT", 105, 25, null, null, "center");
            
            doc.setTextColor(40); doc.setFontSize(12);
            doc.text(`Score: ${d.score}`, 20, 60);
            doc.text(`Faculty: ${d.facultyName}`, 20, 70);
            doc.text(`Verdict: ${d.status}`, 20, 80);
            
            doc.setFontSize(10);
            doc.text(doc.splitTextToSize(d.msg, 170), 20, 100);
            
            doc.setFontSize(8); doc.setTextColor(150);
            doc.text("Support: 08056604409 | Registry: 08060840326", 105, 140, null, null, "center");
            
            window.open(doc.output('bloburl'), '_blank');
        }
    </script>
</body>
</html>
