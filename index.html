<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAUSTECH Admission Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#0A1C3C;color:white;font-family:sans-serif;}
.card{background:rgba(255,255,255,0.06);border-radius:18px;padding:16px;}
.input{width:100%;padding:12px;border-radius:10px;background:#020617;border:1px solid #1e293b;text-align:center;}
.input:focus{border-color:#facc15;outline:none;}
.btn{width:100%;padding:12px;border-radius:10px;font-weight:bold;}
#resultBox{display:none;}
.ticker{overflow:hidden;white-space:nowrap;background:black;border-bottom:2px solid gold;}
.ticker span{display:inline-block;padding-left:100%;animation:scroll 25s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>

<body class="flex flex-col items-center pb-16">

<!-- TICKER -->
<div class="ticker w-full">
<span class="text-yellow-400 text-xs font-bold">
OAUSTECH • FOR SOCIETY AND DEVELOPMENT • EXCELLENCE IN SCIENCE & TECHNOLOGY •
</span>
</div>

<!-- HEADER -->
<div class="mt-6 text-center">
<img src="./logo.png" class="w-20 mx-auto rounded-full border-4 border-yellow-500 bg-white p-1">
<h1 class="text-lg font-bold mt-2">ADMISSION <span class="text-yellow-400">INTELLIGENCE</span></h1>
<p id="counter" class="text-yellow-400 text-xs mt-1">1,284 students checked</p>
<p class="text-[11px] text-gray-400 px-6 mt-2">
Independent advisory tool. Final admission decisions are made by University Management.
</p>
</div>

<!-- MAIN -->
<div class="card w-[92%] max-w-xs mt-5">

<input id="name" placeholder="Your Name" class="input">

<select id="course" class="input mt-3">

<optgroup label="HEALTH">
<option value="225">Nursing Science</option>
<option value="215">Medical Laboratory Science</option>
<option value="200">Public Health</option>
</optgroup>

<optgroup label="SCIENCE">
<option value="200">Computer Science</option>
<option value="195">Biochemistry</option>
<option value="190">Microbiology</option>
<option value="185">Industrial Chemistry</option>
<option value="180">Mathematics</option>
<option value="175">Statistics</option>
<option value="170">Physics</option>
<option value="170">Geophysics</option>
</optgroup>

<optgroup label="ENGINEERING">
<option value="200">Mechanical Engineering</option>
<option value="195">Electrical/Electronics Engineering</option>
<option value="190">Civil Engineering</option>
<option value="185">Chemical Engineering</option>
</optgroup>

<optgroup label="MANAGEMENT">
<option value="200">Accounting</option>
<option value="195">Business Administration</option>
<option value="190">Economics</option>
<option value="185">Entrepreneurship</option>
</optgroup>

<optgroup label="ENVIRONMENT">
<option value="180">Architecture</option>
<option value="175">Building Tech</option>
<option value="175">Estate Management</option>
<option value="170">Urban Planning</option>
<option value="170">Quantity Surveying</option>
</optgroup>

<optgroup label="AGRICULTURE">
<option value="180">Agricultural Economics</option>
<option value="175">Animal Production</option>
<option value="175">Crop Science</option>
<option value="170">Fisheries</option>
<option value="170">Forestry</option>
</optgroup>

</select>

<input id="score" type="number" placeholder="UTME Score" class="input mt-3">

<button onclick="runSim()" class="btn bg-red-700 mt-4">Run Audit</button>

<div id="resultBox" class="mt-4 p-4 bg-black/40 rounded-xl border-l-4 border-yellow-500">
<h2 id="status"></h2>
<p id="message" class="text-sm mt-2 whitespace-pre-line"></p>

<button onclick="downloadPDF()" class="btn bg-yellow-600 mt-3">Download PDF</button>
<button onclick="shareResult()" class="btn bg-green-600 mt-2">Share</button>
</div>

</div>

<script>

/* COUNTER */
let count=1284;
setInterval(()=>{
count+=Math.floor(Math.random()*3)+1;
document.getElementById("counter").innerText=count.toLocaleString()+" students checked";
},3000);

/* RUN */
function runSim(){
let score=parseInt(document.getElementById("score").value);
if(isNaN(score)||score<0||score>400){
showResult("Invalid Score","Enter valid score (0–400)","red");
return;
}
simulate();
}

/* PROCESS EFFECT */
function simulate(){
let steps=["Accessing Registry...","Analyzing Data...","Finalizing Report..."];
let i=0;
function loop(){
if(i<steps.length){
showResult("Processing",steps[i],"yellow");
i++;setTimeout(loop,600);
}else{process();}
}
loop();
}

/* LOGIC */
function process(){

let score=parseInt(document.getElementById("score").value);
let name=document.getElementById("name").value||"Candidate";
let select=document.getElementById("course");
let cutoff=parseInt(select.value);
let course=select.options[select.selectedIndex].text;

let diff=score-cutoff;
let chance=Math.max(5,Math.min(95,50+diff*2));

let level="",color="",msg="";

if(diff>=25){level="STRONG ADVANTAGE";color="green";msg="Excellent performance.";}
else if(diff>=5){level="COMPETITIVE";color="green";msg="Within competitive range.";}
else if(diff>=-10){level="BORDERLINE";color="yellow";msg="Highly competitive.";}
else{level="LOW CHANCE";color="red";msg="Below expected range.";}

let alt=getAlt(score);

showResult(level,
`${name}
Course: ${course}
Chance: ${chance}%

${msg}

Suggested Alternatives:
${alt}`,color);

window.data={name,score,course,level,chance,alt};
}

/* ALT */
function getAlt(score){
if(score>=210)return "Biochemistry, Computer Science";
if(score>=190)return "Microbiology, Public Health";
if(score>=170)return "Industrial Chemistry, Mathematics";
return "Statistics, Basic Sciences";
}

/* DISPLAY */
function showResult(title,text,color){
document.getElementById("resultBox").style.display="block";
document.getElementById("status").innerText=title;
document.getElementById("status").className="text-"+color+"-400 font-bold";
document.getElementById("message").innerText=text;
}

/* PDF (UPGRADED) */
function downloadPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let d=window.data;

// HEADER
doc.setFillColor(10,28,60);
doc.rect(0,0,210,30,'F');

doc.setTextColor(255);
doc.setFontSize(12);
doc.text("OAUSTECH ADMISSION INTELLIGENCE REPORT",105,18,null,null,"center");

// LOGO
let img=new Image();
img.src="./logo.png";

img.onload=function(){

doc.addImage(img,'PNG',90,5,25,15);

// AUDIT ID
let id="OAUS-"+Math.floor(Math.random()*99999);
doc.setTextColor(0);
doc.setFontSize(10);
doc.text("Audit ID: "+id,20,40);

// SECTION LINE
doc.line(20,45,190,45);

// DETAILS
doc.text("Candidate Information",20,55);
doc.line(20,57,100,57);

doc.text(`Name: ${d.name}`,20,65);
doc.text(`Score: ${d.score}`,20,75);
doc.text(`Course: ${d.course}`,20,85);

// RESULT
doc.text("Evaluation Result",20,105);
doc.line(20,107,100,107);

doc.text(`Status: ${d.level}`,20,115);
doc.text(`Chance: ${d.chance}%`,20,125);

// ADVICE
doc.text("Advisory",20,145);
doc.line(20,147,60,147);

doc.text(`Alternative: ${d.alt}`,20,155);

// FOOTER
doc.setFontSize(8);
doc.setTextColor(120);

doc.text(
"Final admission decisions are made exclusively by University Management.",
105,
260,
null,
null,
"center"
);

doc.text(
"System Infrastructure: Zetra Lab",
105,
270,
null,
null,
"center"
);

doc.save("OAUSTECH_Report.pdf");

};
}

/* SHARE */
function shareResult(){
let d=window.data;
if(!d)return alert("Run first");

let text=`OAUSTECH Admission Check

Score: ${d.score}
Course: ${d.course}
Level: ${d.level}
Chance: ${d.chance}%

Check yours:
https://coderinnovator-ship-it.github.io/oustech-web/`;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
