<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAUSTECH | Unified Admission Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --oaustech-blue: #0A1C3C; --oaustech-red: #9B1C2A; --oaustech-gold: #F2B705; }
        body { background: var(--oaustech-blue); font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; }
        .card-glass { background: rgba(10, 28, 60, 0.98); border: 2px solid rgba(255,255,255,0.05); border-top: 6px solid var(--oaustech-red); }
        .btn-official { background: var(--oaustech-red); border-bottom: 4px solid #7D1621; }
        .ticker-wrap { background: #000; border-bottom: 1px solid var(--oaustech-gold); padding: 8px 0; }
        .ticker { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        /* Removed Pulse Animation for a stable Result Box */
        .result-static { background: rgba(0, 0, 0, 0.5); border-left: 4px solid var(--oaustech-gold); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start pb-20">

    <div class="ticker-wrap w-full overflow-hidden mb-8">
        <div class="ticker text-[10px] font-bold text-yellow-400 uppercase tracking-[0.3em] gap-20">
            <span>Building the Blue Economy</span>
            <span>OAUSTECH: Excellence in Science & Technology</span>
            <span>First Choice for Global Innovators</span>
        </div>
    </div>

    <div class="w-full max-w-xl flex flex-col items-center mb-6 px-4 text-center">
        <div class="w-28 h-28 mb-6 bg-white rounded-full flex items-center justify-center p-2 shadow-xl">
            <img src="https://upload.wikimedia.org/wikipedia/en/5/5f/Ondo_State_University_of_Science_and_Technology_logo.png" alt="OAUSTECH" class="w-20">
        </div>
        <h1 class="text-3xl font-extrabold tracking-tighter uppercase leading-tight">
            OAUSTECH <span class="text-yellow-500">AUDIT</span>
        </h1>
        <p class="text-slate-500 text-[10px] font-bold tracking-[0.4em] mt-2 uppercase">For Society and Development</p>
    </div>

    <div class="w-full max-w-xl card-glass rounded-[3rem] p-8 md:p-12 mb-8 mx-4 shadow-2xl">
        <div class="space-y-8">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Academic Faculty</label>
                <select id="courseSelect" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl text-white text-sm outline-none">
                    <option value="medical">Nursing / MLS / Public Health</option>
                    <option value="computing">Computing (CS / Info Tech)</option>
                    <option value="engineering">Engineering & Technology</option>
                    <option value="sciences">Pure & Applied Sciences</option>
                    <option value="management">Management Sciences (Acct, Econ)</option>
                    <option value="earth">Earth Sciences (Geology)</option>
                    <option value="agric">Agriculture & Natural Resources</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Certified UTME Score</label>
                <input type="number" id="jambInput" placeholder="000" class="w-full bg-slate-900 border border-slate-800 p-6 rounded-2xl text-6xl font-black text-white outline-none">
            </div>

            <button onclick="startAudit()" class="w-full btn-official py-6 rounded-2xl font-black text-xs tracking-[0.4em] flex items-center justify-center gap-4 hover:brightness-110 transition-all">
                <span id="btnText">EXECUTE AUDIT</span>
                <div id="loader" class="hidden border-2 border-white/20 border-t-yellow-500 rounded-full w-5 h-5 animate-spin"></div>
            </button>
        </div>

        <div id="resultBox" class="hidden mt-10 p-8 rounded-3xl result-static">
            <div id="statusHeader" class="text-sm font-bold uppercase tracking-widest mb-4"></div>
            <p id="analysisBody" class="text-slate-300 text-sm leading-relaxed mb-8 italic"></p>
            <button onclick="downloadPDF()" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-xl text-[10px] font-black text-white uppercase tracking-widest transition-all">
                Generate Full Institutional Report
            </button>
        </div>
    </div>

    <div class="w-full max-w-xl grid grid-cols-1 md:grid-cols-3 gap-4 px-4 mb-10">
        <a href="https://wa.me/2348056604409" class="flex flex-col items-center p-5 rounded-2xl bg-slate-900/50 border border-slate-800"><i class="fa-solid fa-microchip text-blue-500 mb-2"></i><p class="text-[9px] text-white font-bold">Zetra Support</p></a>
        <a href="tel:+2348060840326" class="flex flex-col items-center p-5 rounded-2xl bg-slate-900/50 border border-slate-800"><i class="fa-solid fa-phone text-red-500 mb-2"></i><p class="text-[9px] text-white font-bold">Registry</p></a>
        <a href="mailto:admissions@oaustech.edu.ng" class="flex flex-col items-center p-5 rounded-2xl bg-slate-900/50 border border-slate-800"><i class="fa-solid fa-envelope text-slate-400 mb-2"></i><p class="text-[9px] text-white font-bold">Email Desk</p></a>
    </div>

    <script>
        const phases = ["Accessing Database...", "Verifying JAMB Score...", "Checking Faculty Quota...", "Generating Report..."];
        
        function startAudit() {
            const score = document.getElementById('jambInput').value;
            if(!score) return;
            const btn = document.getElementById('btnText');
            const ldr = document.getElementById('loader');
            ldr.classList.remove('hidden');
            let p = 0;
            const int = setInterval(() => {
                btn.innerText = phases[p]; p++;
                if(p >= phases.length) {
                    clearInterval(int);
                    btn.innerText = "EXECUTE AUDIT"; ldr.classList.add('hidden');
                    showResult(parseInt(score));
                }
            }, 600);
        }

        function showResult(score) {
            const faculty = document.getElementById('courseSelect').options[document.getElementById('courseSelect').selectedIndex].text;
            const box = document.getElementById('resultBox');
            box.classList.remove('hidden');
            let status = score >= 198 ? "ADMISSION PROBABLE" : "ADVISORY REQUIRED";
            let color = score >= 198 ? "text-green-500" : "text-yellow-500";
            let praise = score >= 250 ? "Exemplary work!" : "Solid performance.";
            
            document.getElementById('statusHeader').innerHTML = `<span class="${color}">${status}</span>`;
            document.getElementById('analysisBody').innerText = `${praise} Based on your score of ${score}, your placement in ${faculty} is under high-priority review. OAUSTECH remains the pride of Okitipupa.`;
            window.lastData = {score, faculty, status, praise};
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = window.lastData;

            // HEADER BLOCK
            doc.setFillColor(10, 28, 60); doc.rect(0, 0, 210, 50, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(18); doc.text("OLUSEGUN AGAGU UNIVERSITY OF SCIENCE", 105, 20, null, null, "center");
            doc.text("& TECHNOLOGY (OAUSTECH), OKITIPUPA", 105, 28, null, null, "center");
            doc.setFontSize(10); doc.text("OFFICIAL ADMISSION ELIGIBILITY AUDIT - 2026 SESSION", 105, 38, null, null, "center");

            // BODY CONTENT
            doc.setTextColor(40); doc.setFontSize(11);
            doc.text(`Candidate Performance Index: ${d.score}`, 20, 65);
            doc.text(`Designated Faculty: ${d.faculty}`, 20, 75);
            doc.text(`Evaluation Outcome: ${d.status}`, 20, 85);
            doc.line(20, 95, 190, 95);

            // INSTITUTIONAL PRAISE & DISCLOSURE
            doc.setFontSize(10);
            const praiseText = [
                "OAUSTECH remains a beacon of academic brilliance in Nigeria, fostered under the visionary leadership",
                "of the Ondo State Government and the dedicated University Management. We celebrate the standard",
                "of excellence set by our Chancellor and Vice-Chancellor in driving industrial transformation."
            ];
            doc.text(praiseText, 20, 110);

            // ZETRA & CREATOR CREDIT
            doc.setFillColor(240, 240, 240); doc.rect(20, 135, 170, 35, 'F');
            doc.setTextColor(60);
            doc.text("SYSTEM ARCHITECTURE BEYOND MVP STANDARDS", 105, 145, null, null, "center");
            doc.setFontSize(9);
            doc.text("Engineered by: CoderInnovator | Powered by: ZETRA COGNITIVE SYSTEMS", 105, 155, null, null, "center");
            doc.text("Building software that bridges the gap between students and the future.", 105, 162, null, null, "center");

            // LEGAL DISCLAIMER
            doc.setTextColor(150); doc.setFontSize(8);
            const disclaimer = "DISCLAIMER: This document is a provisionary advisor. It does not guarantee final admission. Final clearance must be processed through the University Registry and JAMB Central Admissions Processing System (CAPS). All rights reserved.";
            doc.text(doc.splitTextToSize(disclaimer, 170), 20, 200);

            doc.save(`OAUSTECH_Audit_${d.score}.pdf`);
        }
    </script>
</body>
</html>
