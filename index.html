<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAUSTECH | Institutional Merit Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --oaustech-blue: #0A1C3C; --oaustech-red: #9B1C2A; --oaustech-gold: #F2B705; }
        body { background: var(--oaustech-blue); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .card-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-top: 5px solid var(--oaustech-red); }
        #terminal { background: #000; font-family: 'Courier New', monospace; font-size: 10px; color: #00ff00; padding: 10px; border-radius: 8px; margin-top: 15px; border: 1px solid #333; display: none; }
        #result { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.8s ease-in-out; }
        #result.active { max-height: 2000px; opacity: 1; margin-top: 1.5rem; }
    </style>
</head>
<body class="flex flex-col items-center pb-20 pt-10">

    <main class="w-full max-w-sm px-4">
        <div class="card-glass rounded-[2.5rem] p-6 shadow-2xl">
            <h1 class="text-xl font-black mb-6 uppercase text-center">Institutional <span class="text-yellow-500">Merit Audit</span></h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-2">JAMB Registration ID</label>
                    <input type="text" id="jambNum" placeholder="e.g. 2026105544AB" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white text-xs outline-none uppercase font-mono">
                </div>

                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-2">Specific Department</label>
                    <select id="course" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white text-xs outline-none">
                        <option value="225" data-alt="MLS or Public Health">Nursing Science</option>
                        <option value="210" data-alt="Public Health or Biology">Medical Lab Science (MLS)</option>
                        <option value="200" data-alt="Physics or Math">Computer Science</option>
                        <option value="190" data-alt="Agric Engineering">Civil Engineering</option>
                        <option value="180" data-alt="Fisheries">Biological Sciences</option>
                        <option value="165" data-alt="None">Agriculture & Forestry</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-2">UTME Score</label>
                    <input type="number" id="score" placeholder="000" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-5xl font-black text-white text-center outline-none">
                </div>

                <button onclick="startRegistryAudit()" class="w-full bg-red-700 py-4 rounded-xl font-black text-[11px] tracking-widest uppercase">Sync With Registry</button>
            </div>

            <div id="terminal"></div>

            <div id="result" class="p-6 rounded-2xl bg-black/40 border-l-4 border-yellow-500">
                <div id="status" class="text-lg font-black uppercase leading-none mb-4"></div>
                
                <div class="mb-4">
                    <div class="flex justify-between text-[8px] font-bold uppercase mb-1">
                        <span>Merit Pressure Index</span>
                        <span id="pressureText">0%</span>
                    </div>
                    <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                        <div id="pressureBar" class="h-full transition-all duration-1000"></div>
                    </div>
                </div>

                <p id="msg" class="text-slate-300 text-[11px] leading-relaxed mb-6"></p>
                
                <button onclick="generatePDF()" class="w-full bg-yellow-600 p-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Formal Report</button>
            </div>

            <div class="mt-6 p-3 border border-red-900/30 bg-red-900/10 rounded-xl text-[8px] text-center text-red-300">
                <strong>LEGAL:</strong> Independent Zetra Audit. Final decisions reside with OAUSTECH Senate.
            </div>
        </div>
    </main>

    <script>
        function startRegistryAudit() {
            const jamb = document.getElementById('jambNum').value;
            const score = document.getElementById('score').value;
            
            // Fix: Strict JAMB validation
            if(jamb.length < 10 || !/[a-zA-Z]/.test(jamb)) {
                alert("Registry Error: Invalid JAMB Registration Format.");
                return;
            }

            const term = document.getElementById('terminal');
            document.getElementById('result').classList.remove('active');
            term.style.display = 'block';
            term.innerHTML = "> Accessing Registry Database...<br>";
            
            setTimeout(() => term.innerHTML += "> Validating Candidate ID...<br>", 400);
            setTimeout(() => term.innerHTML += "> Cross-referencing Course Quotas...<br>", 800);
            setTimeout(() => {
                term.style.display = 'none';
                processResult();
            }, 1400);
        }

        function processResult() {
            const score = parseInt(document.getElementById('score').value);
            const select = document.getElementById('course');
            const cutoff = parseInt(select.value);
            const courseName = select.options[select.selectedIndex].text;
            const altCourse = select.options[select.selectedIndex].getAttribute('data-alt');
            
            const isQualified = score >= cutoff;
            
            // Fix: Logic Correction (Higher score = LOWER Pressure)
            let pressure;
            if(isQualified) {
                pressure = Math.max(15, 60 - (score - cutoff)); 
            } else {
                pressure = Math.min(98, 75 + (cutoff - score));
            }

            const status = document.getElementById('status');
            status.innerText = isQualified ? "ELIGIBILITY VERIFIED" : "ADVISORY REQUIRED";
            status.className = isQualified ? "text-green-500 text-lg font-black" : "text-yellow-500 text-lg font-black";
            
            const bar = document.getElementById('pressureBar');
            bar.style.width = pressure + "%";
            bar.style.backgroundColor = pressure > 70 ? "#9B1C2A" : "#10B981";
            document.getElementById('pressureText').innerText = pressure + "% PRESSURE";

            let advice = isQualified 
                ? `Registry confirms high alignment for ${courseName}. Performance is robust for the 2026 session.`
                : `Registry suggests caution for ${courseName}. Given your score of ${score}, the system recommends exploring ${altCourse} as a strategic alternative.`;

            document.getElementById('msg').innerText = advice;
            document.getElementById('result').classList.add('active');
            window.lastAudit = { score, courseName, status: status.innerText, msg: advice, jamb: document.getElementById('jambNum').value };
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = window.lastAudit;
            doc.setFillColor(10, 28, 60); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.text("OAUSTECH INSTITUTIONAL AUDIT", 105, 20, null, null, "center");
            doc.setTextColor(40); doc.text(`ID: ${d.jamb}`, 20, 60);
            doc.text(`Program: ${d.courseName}`, 20, 70);
            doc.text(`Score: ${d.score}`, 20, 80);
            doc.text(`Result: ${d.status}`, 20, 90);
            doc.text(doc.splitTextToSize(d.msg, 170), 20, 110);
            window.open(doc.output('bloburl'), '_blank');
        }
    </script>
</body>
    </html>
