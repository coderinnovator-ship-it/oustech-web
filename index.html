<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OAUSTECH Admission Simulation</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    background:#0A1C3C;
    color:white;
    font-family:sans-serif;
}
.card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
}
#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:#0A1C3C;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body class="flex flex-col items-center p-4">

<h1 class="text-xl font-bold text-yellow-400 mb-2">
Admission Simulation Tool
</h1>

<p class="text-[11px] text-gray-400 text-center max-w-sm mb-4">
Independent student-built simulation tool. Not affiliated with 
0.
Final admission decisions are made solely by the University Management.
</p>

<div class="card w-full max-w-sm">

<select id="course" class="w-full p-3 mb-3 bg-black rounded">

<optgroup label="HEALTH SCIENCES">
<option value="225">Nursing Science</option>
<option value="215">Medical Laboratory Science</option>
<option value="200">Public Health</option>
</optgroup>

<optgroup label="SCIENCE">
<option value="200">Computer Science</option>
<option value="195">Biochemistry</option>
<option value="190">Microbiology</option>
<option value="185">Industrial Chemistry</option>
<option value="180">Physics</option>
<option value="180">Mathematics</option>
<option value="175">Statistics</option>
<option value="170">Botany</option>
<option value="170">Zoology</option>
</optgroup>

<optgroup label="ENGINEERING">
<option value="195">Mechanical Engineering</option>
<option value="190">Electrical Engineering</option>
<option value="185">Civil Engineering</option>
</optgroup>

<optgroup label="AGRICULTURE">
<option value="170">Fisheries</option>
<option value="170">Forestry</option>
<option value="170">Crop Science</option>
<option value="170">Animal Production</option>
</optgroup>

<optgroup label="MANAGEMENT SCIENCES">
<option value="200">Accounting</option>
<option value="190">Business Administration</option>
<option value="190">Economics</option>
<option value="185">Public Administration</option>
</optgroup>

</select>

<input id="score" type="number" placeholder="Enter UTME Score"
class="w-full p-4 text-center text-3xl bg-black rounded mb-4">

<button onclick="runAudit()" class="w-full bg-red-700 p-3 rounded font-bold">
Run Simulation
</button>

<div id="result" class="hidden mt-4">

<p id="status" class="font-bold text-lg mb-2"></p>
<p id="analysis" class="text-sm mb-2"></p>
<p id="strategy" class="text-xs text-gray-300"></p>

<button onclick="generatePDF()" class="mt-4 w-full bg-yellow-600 p-2 rounded">
Download Report
</button>

</div>

</div>

<!-- CONTACT SECTION -->
<div class="mt-8 grid grid-cols-2 gap-4 w-full max-w-sm">

<a href="https://wa.me/2348056604409"
class="bg-black p-4 rounded-xl text-center border border-gray-700">
<p class="text-xs text-green-400 font-bold">Technical Support</p>
<p class="text-[10px] text-gray-400">Feedback & Assistance</p>
</a>

<a href="mailto:info@oaustech.edu.ng"
class="bg-black p-4 rounded-xl text-center border border-gray-700">
<p class="text-xs text-blue-400 font-bold">OAUSTECH Contact</p>
<p class="text-[10px] text-gray-400">Official Email</p>
</a>

</div>

<!-- LOADING -->
<div id="overlay">
<p>Processing Academic Data...</p>
</div>

<script>

function runAudit(){

const score=parseInt(document.getElementById('score').value);

if(isNaN(score)||score<0||score>400){
alert("Enter valid score (0-400)");
return;
}

document.getElementById("overlay").style.display="flex";

setTimeout(()=>{
document.getElementById("overlay").style.display="none";
showResult(score);
},3000);

}

function showResult(score){

const select=document.getElementById("course");
const cutoff=parseInt(select.value);
const courseName=select.options[select.selectedIndex].text;

const pass=score>=cutoff;
const percent=Math.floor(Math.random()*20)+10;

document.getElementById("result").classList.remove("hidden");

document.getElementById("status").innerText=
pass?"Within Competitive Range":"Below Competitive Range";

document.getElementById("analysis").innerText=
pass
?`Your score aligns above typical benchmarks for ${courseName}. Estimated performance places you within top ${percent}% of applicants.`
:`Your score falls below typical benchmarks for ${courseName}. Estimated performance is outside top ${percent}% range.`;

document.getElementById("strategy").innerText=
pass
?"Maintain performance and monitor official admission updates."
:"Consider alternative programs and improve academic profile.";

window.finalData={score,courseName,pass,percent};

}

async function generatePDF(){

const {jsPDF}=window.jspdf;
const doc=new jsPDF();

const d=window.finalData;

// LOAD LOGO
let img=null;
try{
img=await fetch('./logo.png')
.then(r=>r.blob())
.then(blob=>new Promise(res=>{
const reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(blob);
}));
}catch(e){}

// HEADER
if(img){
doc.addImage(img,'PNG',85,10,40,40);
}

doc.setFontSize(14);
doc.text("ADMISSION SIMULATION REPORT",105,60,null,null,"center");

// DATA
doc.setFontSize(10);
doc.text("CANDIDATE DATA",20,80);
doc.text(`Score: ${d.score}`,20,90);
doc.text(`Program: ${d.courseName}`,20,100);

// RESULT
doc.text("ANALYSIS RESULT",20,120);
doc.text(
d.pass?"Within Competitive Range":"Below Competitive Range",
20,130);

// NOTE
doc.text("ACADEMIC NOTE",20,150);
doc.text(
d.pass
?`Score is above typical benchmarks. Estimated top ${d.percent}% performance.`
:`Score below benchmark. Consider alternative programs.`,
20,160,{maxWidth:170}
);

// DISCLAIMER
doc.setFontSize(8);
doc.text(
"DISCLAIMER: This is an independent simulation tool and not affiliated with the university. Final admission decisions are made by the University Management.",
20,190,{maxWidth:170}
);

// FOOTER
doc.text("Generated via Academic Simulation Interface",105,280,null,null,"center");

window.open(doc.output('bloburl'));

}

</script>

</body>
</html>
