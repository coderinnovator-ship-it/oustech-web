<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAUSTECH | Unified Admission Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        /* Official University Colors */
        :root {
            --marine-blue: #003366;
            --brick-red: #B22222;
        }

        body { background: #0a0f1d; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .card-glass { background: rgba(15, 23, 42, 0.98); border: 1px solid #1e293b; border-top: 5px solid var(--brick-red); }
        .btn-official { background: var(--marine-blue); border-bottom: 4px solid #001a33; }
        .loader { border: 3px solid #1e293b; border-top: 3px solid var(--brick-red); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-start pt-6">

    <div class="w-full max-w-xl flex flex-col items-center mb-8">
        <div class="w-20 h-20 mb-4 bg-white/10 rounded-full flex items-center justify-center border-2 border-dashed border-slate-700 overflow-hidden">
            <img src="logo.png" alt="OAUSTECH" onerror="this.src='https://via.placeholder.com/150?text=LOGO'" class="w-16">
        </div>
        
        <div class="text-center">
            <h1 class="text-2xl font-extrabold tracking-tighter text-white uppercase leading-none">OAUSTECH <span style="color: var(--brick-red)">SCREENER</span></h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.4em] mt-2 italic uppercase">For Society and Development</p>
        </div>
    </div>

    <div class="w-full max-w-xl card-glass rounded-[2.5rem] p-8 shadow-2xl mb-6">
        <div class="mb-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Academic Faculty</label>
            <select id="courseSelect" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-white text-sm focus:border-red-800 outline-none transition-all">
                <option value="medical">Nursing / MLS / Public Health</option>
                <option value="computing">Computing (CS / Info Tech)</option>
                <option value="engineering">Engineering & Technology</option>
                <option value="sciences">Pure & Applied Sciences</option>
                <option value="management">Management Sciences (Acct, Econ)</option>
                <option value="earth">Earth Sciences (Geology)</option>
                <option value="agric">Agriculture & Natural Resources</option>
            </select>
        </div>

        <div class="mb-8">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Certified UTME Score</label>
            <input type="number" id="jambInput" placeholder="000" 
                   class="w-full bg-slate-900 border border-slate-800 p-5 rounded-xl text-4xl font-black text-white focus:border-red-900 outline-none transition-all placeholder:text-slate-800">
        </div>

        <button id="mainBtn" onclick="startAnalysis()" class="w-full btn-official hover:brightness-125 py-5 rounded-2xl font-black text-xs tracking-[0.2em] transition-all flex items-center justify-center gap-3">
            <span id="btnText">EXECUTE ACADEMIC AUDIT</span>
            <div id="btnLoader" class="loader hidden"></div>
        </button>

        <div id="resultBox" class="hidden mt-8 p-6 rounded-2xl bg-slate-900 border border-slate-800 animate-in fade-in zoom-in duration-500">
            <div class="flex items-center gap-3 mb-4 text-[11px] font-bold uppercase tracking-widest" id="statusHeader"></div>
            <p id="analysisBody" class="text-slate-400 text-sm leading-relaxed mb-6"></p>
            
            <button onclick="downloadPDF()" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-[10px] font-bold text-white uppercase tracking-widest border border-slate-700 flex items-center justify-center gap-2">
                <i class="fa-solid fa-file-pdf text-red-500"></i> GENERATE OFFICIAL REPORT
            </button>
        </div>
    </div>

    <div class="w-full max-w-xl grid grid-cols-1 md:grid-cols-3 gap-3 mb-10">
        <a href="https://wa.me/2348056604409" class="flex flex-col items-center p-4 rounded-2xl bg-slate-900 border border-slate-800 hover:border-blue-500/50">
            <i class="fa-solid fa-microchip text-blue-500 mb-2"></i>
            <p class="text-[8px] font-bold text-slate-500 uppercase">ZETRA HUB</p>
            <p class="text-[9px] text-white font-bold">Tech Desk</p>
        </a>
        <a href="tel:+2347098809476" class="flex flex-col items-center p-4 rounded-2xl bg-slate-900 border border-slate-800 hover:border-red-500/50">
            <i class="fa-solid fa-phone text-red-500 mb-2"></i>
            <p class="text-[8px] font-bold text-slate-500 uppercase">OFFICIAL LINE</p>
            <p class="text-[9px] text-white font-bold">Direct Call</p>
        </a>
        <a href="mailto:admissions@oaustech.edu.ng" class="flex flex-col items-center p-4 rounded-2xl bg-slate-900 border border-slate-800 hover:border-white/50">
            <i class="fa-solid fa-envelope text-slate-300 mb-2"></i>
            <p class="text-[8px] font-bold text-slate-500 uppercase">REGISTRY MAIL</p>
            <p class="text-[9px] text-white font-bold">Email Desk</p>
        </a>
    </div>

    <footer class="text-center pb-12 px-6">
        <p class="text-slate-700 text-[10px] font-bold tracking-[0.2em] uppercase mb-2">© 2026 ZETRA LAB WORLDWIDE | SYSTEMS DEPLOYMENT</p>
        <p class="text-slate-800 text-[8px] max-w-sm mx-auto leading-relaxed">
            PROVISIONARY ADVISORY TOOL. FINAL ADMISSION IS SUBJECT TO ONDO STATE GOVERNMENT POLICY AND UNIVERSITY SENATE APPROVAL.
        </p>
    </footer>

    <script>
        function startAnalysis() {
            const score = document.getElementById('jambInput').value;
            if (!score || score < 100) { alert("Please input a valid UTME score."); return; }
            document.getElementById('btnText').innerText = "AUDITING DATA...";
            document.getElementById('btnLoader').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('btnText').innerText = "EXECUTE ACADEMIC AUDIT";
                document.getElementById('btnLoader').classList.add('hidden');
                processLogic(parseInt(score));
            }, 1500);
        }

        function processLogic(score) {
            const faculty = document.getElementById('courseSelect').value;
            const box = document.getElementById('resultBox');
            const header = document.getElementById('statusHeader');
            const body = document.getElementById('analysisBody');
            box.classList.remove('hidden');
            
            let status = ""; let msg = ""; let color = "";

            if (faculty === 'medical') {
                if (score >= 235) { status = "Tier-1 Merit Eligible"; color = "text-green-500"; msg = "Academic parameters match requirements for Faculty of Clinical Sciences."; }
                else if (score >= 195) { status = "Quota Competitive"; color = "text-yellow-500"; msg = "Candidate score is within the technical range for supplemental review."; }
                else { status = "Course Realignment"; color = "text-red-500"; msg = "Strategic shift to School of Sciences is advised for guaranteed placement."; }
            } else {
                if (score >= 180) { status = "Verified Eligible"; color = "text-green-500"; msg = "Candidate meets institutional benchmarks for the selected faculty."; }
                else { status = "Registry Consultation"; color = "text-yellow-500"; msg = "Placement optimized via School of Agriculture or Earth Sciences programs."; }
            }

            header.innerHTML = `<i class="fa-solid fa-shield-halved ${color}"></i> <span class="${color}">${status}</span>`;
            body.innerText = msg;
            window.currentStatus = status;
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const score = document.getElementById('jambInput').value;
            const faculty = document.getElementById('courseSelect').options[document.getElementById('courseSelect').selectedIndex].text;
            
            // PDF Branding
            doc.setFillColor(0, 51, 102); // Marine Blue
            doc.rect(0, 0, 210, 45, 'F');
            doc.setFillColor(178, 34, 34); // Brick Red Accent
            doc.rect(0, 42, 210, 3, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22); doc.text("OAUSTECH ADMISSIONS AUDIT", 105, 22, null, null, "center");
            doc.setFontSize(10); doc.text("For Society and Development", 105, 32, null, null, "center");

            doc.setTextColor(40, 40, 40);
            doc.setFontSize(12);
            doc.text(`Report ID: ZT-${Math.floor(Math.random()*9000)+1000}`, 20, 60);
            doc.text(`UTME Score: ${score}`, 20, 70);
            doc.text(`Applied Faculty: ${faculty}`, 20, 80);
            doc.text(`Status: ${window.currentStatus}`, 20, 90);
            
            doc.setDrawColor(200, 200, 200); doc.line(20, 110, 190, 110);
            
            doc.setFontSize(8); doc.setTextColor(150, 150, 150);
            doc.text("Verified by Zetra Systems Hub | © 2026 OAUSTECH Institutional Portal", 105, 280, null, null, "center");
            
            doc.save(`OAUSTECH_Audit_${score}.pdf`);
        }
    </script>
</body>
</html>
